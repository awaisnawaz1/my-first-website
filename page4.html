      <button id="sample">Learning</button>

   <script type="text/javascript">
      window.onload = function()  {
        console.log(`The page has loaded`);
      }

      document.getElementById('sample').addEventListener('click', listen);
      
      function listen() {
        console.log('Trying an even listener');
      }

      document.getElementById('box').addEventListener('dblclick', function() {
          console.log('Element was double-clicked');
      })

    /* get height and width of an element */
    let size = document.getElementById('box');
    console.log(size.offsetHeight);
    console.log(size.offsetWidth);
