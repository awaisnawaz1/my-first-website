    <!-- Form Elements -->
      <form class="my-form" onsubmit="myinfo()">
      <!-- Person Entry Section -->
          <div class="person">
            <label for="fname">First Name:</label> <br>
            <input type="text" id="fname" name="fname" onchange="changeEvent()" /> <br>

            <label for="faddress">Address:</label> <br>
            <input type="text" id="faddress" name="faddress" onblur="blurEvent()" />
            <br>
            <label for="pw">Password</label> <br>
            <input type="password" name="pw" id="pw" /> <br>
            <br>
            </div>
            <!-- Radio Button for Movie Genres -->
            <div class="movie-choice"> 
              <input type="radio" id="a" name="movie" value="action" />
              <lable for="a">Action</lable> <br>
              <input type="radio" id="c" name="movie" value="comedy" />
              <lable for="c">Comedy</lable> <br>
              <input type="radio" id="d" name="movie" value="drama" />
              <lable for="d">Drama</lable> <br>
              <input type="radio" id="s" name="movie" value="Scifi" />
              <lable for="s">Scifi</lable> <br>
              <input type="radio" id="r" name="movie" value="romance" />
              <lable for="r">Romance</lable> <br>
              <input type="radio" id="t" name="movie" value="thriller" />
              <lable for="t">Thriller</lable> <br>
            </div>
              <br><br>
              <!-- <input type="button" name="submit" value="Submit" onclick="myInfo()"> -->     <br><br>
              <!-- Output Results -->
              <button type"submit">Submit</button>
            <br><br>
               <div class="result">
                <p id="my-name"></p>
                <p id="movie-choice"></p>
               </div>
      </form>
